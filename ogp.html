<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Noto Sans CJK JP', 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 80px;
    position: relative;
  }

  /* 背景の装飾円 */
  body::before {
    content: '';
    position: absolute;
    top: -120px;
    right: -120px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.07);
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.05);
  }

  .card {
    background: white;
    border-radius: 24px;
    padding: 52px 60px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    position: relative;
    z-index: 1;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .app-name {
    font-size: 22px;
    font-weight: 700;
    color: #667eea;
    letter-spacing: 0.03em;
  }

  .badge {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 18px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 999px;
    letter-spacing: 0.05em;
  }

  .question-label {
    font-size: 17px;
    font-weight: 600;
    color: #a0aec0;
    margin-bottom: 18px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .question-text {
    font-size: 38px;
    font-weight: 700;
    color: #1a202c;
    line-height: 1.55;
    letter-spacing: 0.02em;
  }

  .footer {
    margin-top: 36px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .category-tag {
    background: #f0f4ff;
    color: #667eea;
    font-size: 17px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 8px;
  }

  .url {
    font-size: 16px;
    color: #a0aec0;
    margin-left: auto;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="app-name">毎日10問 IT資格予想問題集</span>
      <span class="badge">ITパスポート・ストラテジ系</span>
    </div>
    <div class="question-label">Q. 今日の問題</div>
    <div class="question-text">損益計算書（P/L）における「売上総利益」の<br>計算式として正しいものはどれか。</div>
    <div class="footer">
      <span class="category-tag">企業活動</span>
      <span class="url">mainichi10.page</span>
    </div>
  </div>
</body>
</html>
